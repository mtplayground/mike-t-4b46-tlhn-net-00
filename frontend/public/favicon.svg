<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">TLHN favicon</title>
  <desc id="desc">Dark rounded tile with a red neon TLHN mark.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#211015" />
      <stop offset="0.48" stop-color="#10090d" />
      <stop offset="1" stop-color="#020204" />
    </radialGradient>
    <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feColorMatrix
        in="blur"
        result="glow"
        type="matrix"
        values="1 0 0 0 0.98  0 0.08 0 0 0.02  0 0 0.08 0 0.03  0 0 0 0.85 0"
      />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M0 0h4v1H0z" fill="#ff244d" opacity="0.12" />
    </pattern>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bgGlow)" />
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#ff2048" stroke-opacity="0.55" stroke-width="3" />
  <rect x="5" y="5" width="54" height="54" rx="10" fill="url(#scanlines)" opacity="0.45" />
  <path d="M12 18h40M18 14v36M30 14v36M44 14v36" stroke="#3a1018" stroke-width="2" opacity="0.7" />

  <g filter="url(#redGlow)" fill="#ff264f" font-family="'Courier New', monospace" font-weight="900" text-anchor="middle">
    <text x="32" y="29" font-size="17" letter-spacing="1.2">TL</text>
    <text x="32" y="47" font-size="17" letter-spacing="1.2">HN</text>
  </g>
  <path d="M13 51h11M40 13h11M48 50h4M12 14h4" stroke="#ff6f88" stroke-width="2" stroke-linecap="square" opacity="0.9" />
</svg>
